name: 데이터 자동 갱신

on:
  schedule:
    # 매 평일 22:00 UTC (한국 오전 7시) — 미국 장 마감 후
    - cron: '0 22 * * 1-5'
  workflow_dispatch: {}   # 수동 실행 버튼

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: https://hffuxqijuoempxeblddx.supabase.co
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python ingest.py       # 원천 지표 수집 (미국+한국: 심리·유동성 지표)
      - run: python sentiment.py     # S(t) 심리점수 계산 → sentiment_daily
      - run: python liquidity.py     # L(t) 유동성 지수 계산 → liquidity_daily
      - run: python backtest.py      # 심리 밴드별 통계 → backtest_stats
      - run: python liquidity_backtest.py  # 유동성 밴드별 통계 → liquidity_backtest_stats
